name: Publish and Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: New version (e.g. 0.2.0)
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: node scripts/bump-version.js ${{ github.event.inputs.version }}

      - run: git config user.name github-actions
      - run: git config user.email github-actions@github.com

      - run: git add packages/*/package.json
      - run: git commit -m "chore: bump version to ${{ github.event.inputs.version }}"
      - run: git tag v${{ github.event.inputs.version }}

      - run: pnpm build

      - run: pnpm publish packages/core --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: pnpm publish packages/next-agents --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: pnpm publish packages/express-agents --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: git push origin HEAD:main
      - run: git push origin v${{ github.event.inputs.version }}
